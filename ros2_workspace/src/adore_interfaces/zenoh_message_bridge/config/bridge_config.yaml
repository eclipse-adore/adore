# ROS2 domain ID this bridge node subscribes/publishes on.
# Defaults to $ROS_DOMAIN if unset.
ros_domain_id: 0

# Domain ID embedded in zenoh key expressions.
# Must match the ROS_DOMAIN_ID of the rmw_zenoh_cpp peers you are bridging to/from.
# Defaults to 0 if unset.
zenoh_bridge_id: 62

# Target RMW distro for zenoh key expression compatibility.
# 'humble' uses TypeHashNotSupported (compatible with Humble and older).
# 'jazzy'  uses the RIHS01 type hash from the local ROS installation.
# if set to humble this allows jazzy => humble and humble => jazzy data exchange.
# Defaults to 'humble' if unset.
rmw_target: humble
#rmw_target: jazzy

# Bridge ROS2 DDS topics to zenoh.
# The receiving end must be running rmw_zenoh_cpp with a matching zenoh_bridge_id.
ros2_to_zenoh:
  - ros_topic: "/ros2_chatter"
    msg_type: "std_msgs/msg/String"
    format: cdr         # Serialization format: 'cdr' (default) or 'json'.
    #                   # 'json': serializes message fields as a JSON string with
    #                   #   'datatype' metadata appended.
    #                   #   The zenoh transport type becomes std_msgs/msg/String
    #                   #   regardless of msg_type.
    #                   # 'cdr': raw CDR bytes, transport type matches msg_type.
    # domain_id: 62     # Overrides zenoh_bridge_id for this topic only.
    # qos_reliability: reliable     # 'reliable' (default) or 'best_effort'
    # qos_durability: volatile      # 'volatile' (default) or 'transient_local'
    # qos_depth: 1                  # History depth. Defaults to 1.

# Bridge zenoh topics to ROS2 DDS.
# The publishing end must be running rmw_zenoh_cpp with a matching zenoh_bridge_id.
zenoh_to_ros2:
  - ros_topic: "/zenoh_chatter"
    msg_type: "std_msgs/msg/String"
    format: cdr         # Serialization format: 'cdr' (default) or 'json'.
    #                   # 'json': expects a JSON string payload with 'datatype'
    #                   #   metadata. Subscribes on the std_msgs/msg/String zenoh
    #                   #   key and deserializes back into msg_type before
    #                   #   publishing to DDS.
    #                   # 'cdr': raw CDR bytes, subscribes on the msg_type key.
    # domain_id: 62     # Overrides zenoh_bridge_id for this topic only.
    # qos_reliability: best_effort  # 'best_effort' (default) or 'reliable'
    # qos_durability: volatile      # 'volatile' (default) or 'transient_local'
    # qos_depth: 1                  # History depth. Defaults to 1.
