mqtt:
  host: localhost
  port: 1883
  # host_env: MQTT_HOST
  # port_env: MQTT_PORT
  keepalive: 60
  transport: tcp        # tcp | websockets
  protocol: mqtt        # mqtt (v3.1.1) | mqttv5
  env_file: .mqtt_secrets.env

  auth:
    username_env: MQTT_USERNAME
    password_env: MQTT_PASSWORD

  # TLS configuration.
  # enabled / ca_certs / certfile / keyfile all support _env variants,
  # e.g. enabled_env: MQTT_TLS, ca_certs_env: MQTT_CA_CERT, etc.
  tls:
    enabled: false
    ca_certs: broker.crt
    certfile: client.crt
    keyfile:  client.key

    # Set true only to disable hostname verification (testing only).
    insecure: false

  reconnect_delay: 1
  reconnect_max_delay: 120

ros2_to_mqtt: []
  # - ros_topic: /example/ros_topic
  #   mqtt_topic: example/mqtt_topic
  #   msg_type: std_msgs/msg/String
  #   format: cdr          # cdr | json | cdr_json
  #   qos_depth: 10
  #   qos_durability: volatile      # volatile | transient_local
  #   qos_reliability: best_effort  # best_effort | reliable

