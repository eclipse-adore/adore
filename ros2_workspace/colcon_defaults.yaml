build:
  symlink-install: true
  continue-on-error: false
  parallel-workers: 11
  cmake-args:
    - -DCMAKE_C_COMPILER_LAUNCHER=ccache
    - -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
    - -DCMAKE_POSITION_INDEPENDENT_CODE=ON
    - -DCMAKE_BUILD_TYPE=Release
  event-handlers:
    - console_cohesion+
test:
  event-handlers:
    - console_direct+
