@INCLUDE                = "./Doxyfile.cfg"
GENERATE_HTML           = YES 
GENERATE_XML            = YES
GENERATE_XML2DOT        = YES
GENERATE_XML            = YES
OUTPUT_DIRECTORY       = "./generated_doxygen_documentation"

# Project Stuff
PROJECT_NAME           = "ADORe"
PROJECT_BRIEF          = "ADORe is a modular open source software library and toolkit for decision making, planning, control and simulation of automated vehicles"

# Inputs
INPUT                  = "./../../ros2_workspace/src"

EXCLUDE_PATTERNS       = */build/*
EXCLUDE_PATTERNS      += */external/*
EXCLUDE_PATTERNS      += */vendor/*

RECURSIVE              = YES

FILE_PATTERNS          = *.c \
                         *.cc \
                         *.cxx \
                         *.cpp \
                         *.c++ \
                         *.java \
                         *.h \
                         *.hh \
                         *.hxx \
                         *.hpp \
                         *.h++ \
                         *.py

UML_LOOK = YES


HAVE_DOT               = YES
DOT_CLEANUP            = NO

GRAPHICAL_HIERARCHY    = YES
GENERATE_TREEVIEW      = YES

EXTRACT_ALL            = YES
EXTRACT_PRIVATE        = YES
EXTRACT_STATIC         = YES
EXTRACT_ANON_NSPACES   = YES
EXTRACT_LOCAL_CLASSES  = YES
EXTRACT_LOCAL_METHODS  = YES
EXTRACT_PACKAGE        = YES
EXTRACT_PRIVATE        = YES
EXTRACT_STATIC         = YES

CALL_GRAPH             = YES
CALLER_GRAPH           = YES
CLASS_GRAPH            = YES
COLLABORATION_GRAPH    = YES
INHERITANCE_GRAPH      = YES
CLASS_DIAGRAMS         = YES
DISABLE_INDEX          = YES 

