---
name: CI_native_x86

on:
  push:
    branches:
      - 'master'
      - 'develop'
      - '**'
  pull_request:
    branches:
      - '**'


jobs:
  adore_amd64:
    uses: ./.github/workflows/reuse-build.yaml@develop
    with:
      platform: 'ubuntu-24.04'
      archive_name: 'build_x86'

  adore_arm64:
    uses: ./.github/workflows/reuse-build.yaml@develop
    with:
      platform: 'ubuntu-24.04-arm'
      archive_name: 'build_arm64'