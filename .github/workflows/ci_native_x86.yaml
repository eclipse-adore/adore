---
name: ADORe CI

on:
  push:
    branches:
      - 'master'
      - 'develop'
      - '**'
  pull_request:
    branches:
      - '**'


jobs:
  x86_64:
    name: x86_64
    uses: ./.github/workflows/reuse-build.yaml
    with:
      platform: 'ubuntu-24.04'
      archive_name: 'build_x86'
    secrets: inherit

  arm64:
    name: arm64
    uses: ./.github/workflows/reuse-build.yaml
    with:
      platform: 'ubuntu-24.04-arm'
      archive_name: 'build_arm64'
    secrets: inherit