name: reuse-build

on:
  workflow_call:
    inputs:
      arch:
        description: Target architecture (x86_64 or aarch64)
        required: true
        type: string
      runner:
        description: GitHub Actions runner label
        required: true
        type: string
      push:
        description: Push images to registry after tests pass
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ${{ inputs.runner }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── ADORe CLI ─────────────────────────────────────────────────────────────
      - name: Build ADORe CLI
        run: make build

      - name: Package ADORe CLI
        run: make package

      - name: Push ADORe CLI images
        if: inputs.push
        run: make push_images

      # ── ADORe Embedded ────────────────────────────────────────────────────────
      - name: Build ADORe Embedded (pull or build)
        run: cd adore_embedded && make pull_or_build

      - name: Package ADORe Embedded
        run: cd adore_embedded && make package && make bundle

      # ── Lichtblick ────────────────────────────────────────────────────────────
      - name: Build Lichtblick (pull or build)
        run: cd tools/lichtblick && make build

      # ── Tests ─────────────────────────────────────────────────────────────────
      - name: Run tests
        run: bash .ci test

      # ── Push images (only after tests pass) ───────────────────────────────────
      - name: Push ADORe Embedded image
        if: inputs.push
        run: cd adore_embedded && make push

      - name: Push Lichtblick image
        if: inputs.push
        run: cd tools/lichtblick && make push_lichtblick

      # ── Upload build artifacts ─────────────────────────────────────────────────
      - name: Upload ADORe CLI package
        uses: actions/upload-artifact@v4
        with:
          name: adore-cli-package-${{ inputs.arch }}
          path: build/adore_cli_*.tar.gz
          if-no-files-found: error

      - name: Upload ADORe Embedded packages
        uses: actions/upload-artifact@v4
        with:
          name: adore-embedded-packages-${{ inputs.arch }}
          path: adore_embedded/packages/adore_embedded_*.tar.gz
          if-no-files-found: error
