name: adore CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  build-test-push-publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}

    env:
      # Ensure all image pushes go to the current repo's registry namespace
      # where GITHUB_TOKEN has write permission. Without this, push_core_image
      # and push_base_image derive ADORE_CLI_REPO from the adore_cli submodule
      # remote (eclipse-adore/adore_cli) and fail with permission_denied.
      ADORE_CLI_REPO: ${{ github.repository }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── ADORe CLI + ADORe ─────────────────────────────────────────────────────
      - name: Build Vendor Libraries
        run: make build_vendor_libraries

      - name: Build ADORe CLI
        run: make build_adore_cli

      - name: Build ADORe ROS2 Workspace
        run: make build_ros_workspace

      - name: Package ADORe
        run: make package

      # ── ADORe Embedded ────────────────────────────────────────────────────────
      - name: Build ADORe Embedded (pull or build)
        run: cd adore_embedded && make pull_or_build

      - name: Package ADORe Embedded
        run: cd adore_embedded && make package && make bundle

      # ── Lichtblick ────────────────────────────────────────────────────────────
      - name: Build Lichtblick (pull or build)
        run: cd tools/lichtblick && make build

      # ── Tests ─────────────────────────────────────────────────────────────────
      - name: Run tests
        run: bash .ci test

      # ── Push images (only after tests pass) ───────────────────────────────────
      - name: Push ADORe CLI images
        if: github.event_name != 'pull_request'
        run: make push_images

      - name: Push ADORe Embedded image
        if: github.event_name != 'pull_request'
        run: cd adore_embedded && make push

      - name: Push Lichtblick image
        if: github.event_name != 'pull_request'
        run: cd tools/lichtblick && make push_lichtblick

      # ── Upload build artifacts ─────────────────────────────────────────────────
      - name: Upload ADORe Embedded packages
        uses: actions/upload-artifact@v4
        with:
          name: adore-embedded-packages-${{ matrix.arch }}
          path: adore_embedded/packages/adore_embedded_*.tar.gz
          if-no-files-found: error

  # ── Release ───────────────────────────────────────────────────────────────────
  release:
    needs: build-test-push-publish
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest

    steps:
      - name: Download ADORe Embedded packages (x86_64)
        uses: actions/download-artifact@v4
        with:
          name: adore-embedded-packages-x86_64
          path: dist/

      - name: Download ADORe Embedded packages (aarch64)
        uses: actions/download-artifact@v4
        with:
          name: adore-embedded-packages-aarch64
          path: dist/

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
