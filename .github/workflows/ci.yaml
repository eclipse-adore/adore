name: ADORe CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  release:
    types: [published]

permissions:
  contents: write
  packages: write

jobs:
  build-x86_64:
    uses: ./.github/workflows/reuse-build.yml
    with:
      arch: x86_64
      runner: ubuntu-latest
      push: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  build-aarch64:
    uses: ./.github/workflows/reuse-build.yml
    with:
      arch: aarch64
      runner: ubuntu-24.04-arm
      push: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  release:
    needs: [build-x86_64, build-aarch64]
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest

    steps:
      - name: Download ADORe CLI package (x86_64)
        uses: actions/download-artifact@v4
        with:
          name: adore-cli-package-x86_64
          path: dist/

      - name: Download ADORe CLI package (aarch64)
        uses: actions/download-artifact@v4
        with:
          name: adore-cli-package-aarch64
          path: dist/

      - name: Download ADORe Embedded packages (x86_64)
        uses: actions/download-artifact@v4
        with:
          name: adore-embedded-packages-x86_64
          path: dist/

      - name: Download ADORe Embedded packages (aarch64)
        uses: actions/download-artifact@v4
        with:
          name: adore-embedded-packages-aarch64
          path: dist/

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
