name: ADORe CI

on:
  push:
    branches:
      - 'master'
      - 'develop'
      - '**'
  pull_request:
    branches:
      - '**'
      
jobs:
  x86_64:
    name: Native x86_64
    uses: ./.github/workflows/reuse-build.yaml
    with:
      platform: 'ubuntu-24.04'
      archive_name: 'x86_64'
    secrets: inherit

  arm64:
    name: Native arm64
    uses: ./.github/workflows/reuse-build.yaml
    with:
      platform: 'ubuntu-24.04-arm'
      archive_name: 'arm64'
    secrets: inherit
